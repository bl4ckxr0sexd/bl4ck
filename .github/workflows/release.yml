name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Build artifacts only (no GitHub release)'
        type: boolean
        default: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.4'
  GO_VERSION: '1.25.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# SR-007: least-privilege default for every job. Build jobs only need to read
# the repo + exchange artifacts. Jobs that publish override this with their
# own per-job `permissions:` (create-release → contents: write; GHCR pushes →
# packages: write; Tauri/MSI signing → id-token: write).
permissions:
  contents: read

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@breeze/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 30

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: web-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Web
        env:
          PUBLIC_APP_VERSION: ${{ steps.web-version.outputs.version }}
        run: pnpm build --filter=@breeze/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 30

  build-agent:
    name: Build Agent
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            cgo: '0'
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "bl4ck-agent-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/bl4ck-agent

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/bl4ck-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

      - name: Build bl4ck-backup
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "bl4ck-backup-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/bl4ck-backup

      - name: Upload bl4ck-backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-backup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/bl4ck-backup-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

      - name: Build bl4ck-watchdog
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "bl4ck-watchdog-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/bl4ck-watchdog

      - name: Upload bl4ck-watchdog artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-watchdog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/bl4ck-watchdog-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

  build-windows-msi:
    name: Build + Sign Windows Artifacts
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: windows-latest
    needs: [build-agent]
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ contains(github.ref_name, '-') && 'signing-prerelease' || 'signing-production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        shell: pwsh
        run: go mod download

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool update --global wix | Out-Null
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix | Out-Null
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          wix eula accept wix7

      - name: Get version from tag
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME.Substring(1)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows resources and binary
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Fail-fast: a non-terminating PowerShell error (e.g. a missing
          # toolchain) otherwise lets a later `go build` proceed against
          # stale or missing resources, and a non-zero `go build` exit code
          # is silently ignored unless we check $LASTEXITCODE — that
          # combination shipped a release once where the agent .exe was
          # absent from dist\ and the installer step packaged whatever was
          # left from a previous run.
          $ErrorActionPreference = "Stop"
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          go install github.com/tc-hib/go-winres@v0.3.3
          $winres = "$env:USERPROFILE\go\bin\go-winres.exe"
          # Embed VERSIONINFO + manifest + icon resources into every Windows
          # binary we ship. Without an embedded FileVersion, MSI treats our
          # exes as "unversioned" and applies the "preserve user-modified
          # unversioned files" rule, which surfaces in install.log as
          # `File: ...\bl4ck-agent.exe; Won't Overwrite` whenever an existing
          # binary at the install path has been modified (#944).
          #
          # We use `go-winres simply` (CLI args) rather than `make` + JSON
          # because .ico files work via --icon in simply mode but not in
          # JSON-mode RT_GROUP_ICON entries (go-winres v0.3.x rejects them
          # with "image: unknown format"). Each invocation is checked for
          # $LASTEXITCODE so a tooling failure aborts the release.
          Push-Location agent\resources
          & $winres simply --arch amd64 --no-suffix --icon icon.ico --admin `
            --file-version $env:BUILD_VERSION --product-version $env:BUILD_VERSION `
            --product-name "BL4CK RMM Agent" --file-description "BL4CK RMM Agent" `
            --copyright "Copyright (c) BL4CK RMM" --original-filename "bl4ck-agent.exe" `
            --out ..\cmd\bl4ck-agent\rsrc_windows_amd64.syso
          if ($LASTEXITCODE -ne 0) { throw "go-winres simply bl4ck-agent failed with exit code $LASTEXITCODE" }
          # bl4ck-user-helper: asInvoker (NOT --admin). It is spawned into the
          # logged-in user's session with that user's filtered token; an admin
          # manifest makes CreateProcessAsUser fail ERROR_ELEVATION_REQUIRED
          # (#949 regression). Keeps VERSIONINFO for the #944 MSI overwrite rule.
          & $winres simply --arch amd64 --no-suffix --icon icon.ico `
            --file-version $env:BUILD_VERSION --product-version $env:BUILD_VERSION `
            --product-name "BL4CK RMM User Helper" --file-description "BL4CK RMM User Helper" `
            --copyright "Copyright (c) BL4CK RMM" --original-filename "bl4ck-user-helper.exe" `
            --out ..\cmd\bl4ck-user-helper\rsrc_windows_amd64.syso
          if ($LASTEXITCODE -ne 0) { throw "go-winres simply bl4ck-user-helper failed with exit code $LASTEXITCODE" }
          & $winres simply --arch amd64 --no-suffix --icon icon.ico `
            --file-version $env:BUILD_VERSION --product-version $env:BUILD_VERSION `
            --product-name "BL4CK RMM Watchdog" --file-description "BL4CK RMM Watchdog" `
            --copyright "Copyright (c) BL4CK RMM" --original-filename "bl4ck-watchdog.exe" `
            --out ..\cmd\bl4ck-watchdog\rsrc_windows_amd64.syso
          if ($LASTEXITCODE -ne 0) { throw "go-winres simply bl4ck-watchdog failed with exit code $LASTEXITCODE" }
          & $winres simply --arch amd64 --no-suffix --icon icon.ico `
            --file-version $env:BUILD_VERSION --product-version $env:BUILD_VERSION `
            --product-name "BL4CK RMM Backup Helper" --file-description "BL4CK RMM Backup Helper" `
            --copyright "Copyright (c) BL4CK RMM" --original-filename "bl4ck-backup.exe" `
            --out ..\cmd\bl4ck-backup\rsrc_windows_amd64.syso
          if ($LASTEXITCODE -ne 0) { throw "go-winres simply bl4ck-backup failed with exit code $LASTEXITCODE" }
          Pop-Location
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\bl4ck-agent-windows-amd64.exe .\cmd\bl4ck-agent
          if ($LASTEXITCODE -ne 0) { throw "go build bl4ck-agent failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build bl4ck-backup
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\bl4ck-backup-windows-amd64.exe .\cmd\bl4ck-backup
          if ($LASTEXITCODE -ne 0) { throw "go build bl4ck-backup failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build bl4ck-watchdog
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\bl4ck-watchdog-windows-amd64.exe .\cmd\bl4ck-watchdog
          if ($LASTEXITCODE -ne 0) { throw "go build bl4ck-watchdog failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build bl4ck-user-helper (GUI-subsystem sibling of bl4ck-agent).
          # Thin cmd/bl4ck-user-helper wrapper over the same internal/agentapp
          # code as bl4ck-agent — only the -H windowsgui linker flag and the
          # embedded asInvoker manifest differ. The separate cmd package is what
          # lets it ship asInvoker instead of the agent's requireAdministrator.
          # Required by the AgentUserHelper scheduled task and the sessionbroker
          # user-session spawn path (which uses the user's non-elevated token).
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION -H windowsgui" -o ..\dist\bl4ck-user-helper-windows-amd64.exe .\cmd\bl4ck-user-helper
          if ($LASTEXITCODE -ne 0) { throw "go build bl4ck-user-helper failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Regression guard (#949): assert the SHIPPED manifests are correct.
          # The user-helper MUST be asInvoker and the agent MUST be
          # requireAdministrator — and the inverse for each, since #949 is a
          # bidirectional regression (user-helper gaining admin OR agent losing
          # it both break). Read via .NET ReadAllBytes (Get-Content -Encoding
          # Byte was removed in pwsh 7) and scan the exe's ASCII projection. cwd
          # is the repo root here (the builds above Push-Location'd into agent
          # and wrote ..\dist), so dist\ resolves at the repo root. The regexes
          # are quote/spacing/attribute-order tolerant so a benign go-winres
          # formatting change can't silently flip the guard.
          $uhText = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes((Resolve-Path "dist\bl4ck-user-helper-windows-amd64.exe").Path))
          if ($uhText -notmatch 'requestedExecutionLevel[^>]*level\s*=\s*["'']asInvoker') { throw "bl4ck-user-helper.exe is not asInvoker — would reintroduce #949 (740 on filtered-token sessions)" }
          if ($uhText -match 'level\s*=\s*["'']requireAdministrator') { throw "bl4ck-user-helper.exe is requireAdministrator — wrong manifest (#949)" }
          $agText = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes((Resolve-Path "dist\bl4ck-agent-windows-amd64.exe").Path))
          if ($agText -notmatch 'requestedExecutionLevel[^>]*level\s*=\s*["'']requireAdministrator') { throw "bl4ck-agent.exe lost its requireAdministrator manifest" }
          if ($agText -match 'level\s*=\s*["'']asInvoker') { throw "bl4ck-agent.exe is asInvoker — lost its requireAdministrator manifest (#949)" }
          Write-Host "Manifest guard OK: user-helper=asInvoker, agent=requireAdministrator"

      - name: Validate signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERT_PROFILE_PROD: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          AZURE_CERT_PROFILE_PRERELEASE: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
        run: |
          $required = @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SIGNING_ENDPOINT", "AZURE_SIGNING_ACCOUNT_NAME")
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Missing required signing secret: $name"
            }
          }

          $isPrerelease = "${{ contains(github.ref_name, '-') }}" -eq "true"
          if ($isPrerelease) {
            if ([string]::IsNullOrWhiteSpace($env:AZURE_CERT_PROFILE_PRERELEASE)) {
              throw "Missing required signing secret: AZURE_CERT_PROFILE_PRERELEASE"
            }
          } else {
            if ([string]::IsNullOrWhiteSpace($env:AZURE_CERT_PROFILE_PROD)) {
              throw "Missing required signing secret: AZURE_CERT_PROFILE_PROD"
            }
          }

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign Windows EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\bl4ck-agent-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\bl4ck-agent-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign backup EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\bl4ck-backup-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign backup EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\bl4ck-backup-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign watchdog executable (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\bl4ck-watchdog-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign watchdog executable (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\bl4ck-watchdog-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign user-helper EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\bl4ck-user-helper-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign user-helper EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\bl4ck-user-helper-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build MSI
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          $version = "${{ steps.version.outputs.version }}"
          $agentExe = Join-Path $root "dist\bl4ck-agent-windows-amd64.exe"
          $backupExe = Join-Path $root "dist\bl4ck-backup-windows-amd64.exe"
          $watchdogExe = Join-Path $root "dist\bl4ck-watchdog-windows-amd64.exe"
          $userHelperExe = Join-Path $root "dist\bl4ck-user-helper-windows-amd64.exe"
          $msiPath = Join-Path $root "dist\bl4ck-agent.msi"
          & (Join-Path $root "agent\installer\build-msi.ps1") -Version $version -AgentExePath $agentExe -BackupExePath $backupExe -WatchdogExePath $watchdogExe -UserHelperExePath $userHelperExe -OutputPath $msiPath

      # Sign the agent MSI (Azure Trusted Signing).
      - name: Sign MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\bl4ck-agent.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\bl4ck-agent.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        shell: pwsh
        run: |
          $targets = @(
            (Join-Path $env:GITHUB_WORKSPACE "dist\bl4ck-agent-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\bl4ck-backup-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\bl4ck-watchdog-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\bl4ck-agent.msi")
          )
          foreach ($target in $targets) {
            $sig = Get-AuthenticodeSignature -FilePath $target
            # Valid = fully trusted chain; UnknownError = signed but Azure Trusted
            # Signing root cert not yet in local trust store (normal for new accounts)
            if ($sig.Status -ne "Valid" -and $sig.Status -ne "UnknownError") {
              throw "Signature validation failed for $target. Status: $($sig.Status)"
            }
            if ($sig.Status -eq "UnknownError") {
              Write-Host "::warning::$target signed but root cert not yet trusted locally (Status: UnknownError). This is normal for new Azure Trusted Signing accounts."
            }
            Write-Host "Verified: $target - Status: $($sig.Status) - Signer: $($sig.SignerCertificate.Subject)"
          }

      - name: Upload signed Windows EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-agent-windows-amd64
          path: dist/bl4ck-agent-windows-amd64.exe
          overwrite: true
          retention-days: 30

      # Issue #816: ship the user-helper as a discrete GitHub release asset
      # so the agent's in-place auto-upgrade can fetch it directly. Pre-#816
      # the binary was only ever bundled into the MSI installer, which meant
      # hosts that reached new versions via auto-update never received it
      # and the HelperLifecycleManager fell through to a
      # `bl4ck-agent.exe user-helper` fallback every ~30s.
      - name: Upload signed Windows user-helper EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-user-helper-windows-amd64
          path: dist/bl4ck-user-helper-windows-amd64.exe
          overwrite: true
          retention-days: 30

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-agent-windows-msi
          path: dist/bl4ck-agent.msi
          retention-days: 30

      - name: Upload signed backup EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-backup-windows-amd64
          path: dist/bl4ck-backup-windows-amd64.exe
          overwrite: true
          retention-days: 30

      - name: Upload signed watchdog EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-watchdog-windows-amd64
          path: dist/bl4ck-watchdog-windows-amd64.exe
          overwrite: true
          retention-days: 30

  build-viewer:
    name: Build Viewer
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: breeze-viewer-windows.msi
            asset_glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/viewer/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into viewer config
        shell: bash
        working-directory: apps/viewer
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Strip prerelease suffix for WiX/Tauri/Cargo compatibility (e.g. 0.11.3-rc.1 → 0.11.3)
          MSI_VERSION="${BUILD_VERSION%%-*}"
          # Update tauri.conf.json — match any semver version string
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update window title to include version
          sed -i.bak 's/"title": "BL4CK Remote Desktop"/"title": "BL4CK Remote Desktop '"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak 's/^version = "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/version = "'"$MSI_VERSION"'"/' src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          # Update package.json
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' package.json && rm package.json.bak
          echo "Injected version $MSI_VERSION into viewer config files (from $BUILD_VERSION)"

      - name: Validate signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set — update signing will fail"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        working-directory: apps/viewer
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Find and rename artifact
        id: find_asset
        shell: bash
        working-directory: apps/viewer
        run: |
          asset=$(ls ${{ matrix.asset_glob }} 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "ERROR: No asset found matching ${{ matrix.asset_glob }}"
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$asset" "${{ matrix.asset_name }}"
          echo "path=${{ matrix.asset_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload Viewer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: apps/viewer/${{ matrix.asset_name }}
          retention-days: 30

  build-helper:
    name: Build Helper
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: bl4ck-helper-windows.msi
            asset_glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/helper/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into helper config
        shell: bash
        working-directory: apps/helper
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Strip prerelease suffix for WiX/Tauri/Cargo compatibility (e.g. 0.11.3-rc.1 → 0.11.3)
          MSI_VERSION="${BUILD_VERSION%%-*}"
          # Update tauri.conf.json — match any semver version string
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update window title to include version
          sed -i.bak 's/"title": "BL4CK Remote Desktop"/"title": "BL4CK Remote Desktop '"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak 's/^version = "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/version = "'"$MSI_VERSION"'"/' src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          # Update package.json
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' package.json && rm package.json.bak
          echo "Injected version $MSI_VERSION into helper config files (from $BUILD_VERSION)"

      - name: Build Tauri app
        working-directory: apps/helper
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Find and rename artifact
        id: find_asset
        shell: bash
        working-directory: apps/helper
        run: |
          asset=$(ls ${{ matrix.asset_glob }} 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "ERROR: No asset found matching ${{ matrix.asset_glob }}"
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$asset" "${{ matrix.asset_name }}"
          echo "path=${{ matrix.asset_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload Helper artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: apps/helper/${{ matrix.asset_name }}
          retention-days: 30

  sign-windows-tauri:
    name: Sign Windows Tauri Artifacts
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: windows-latest
    needs: [build-viewer, build-helper]
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ contains(github.ref_name, '-') && 'signing-prerelease' || 'signing-production' }}
    steps:
      - name: Download viewer Windows MSI
        uses: actions/download-artifact@v8
        with:
          name: breeze-viewer-windows.msi
          path: staging/

      - name: Download helper Windows MSI
        uses: actions/download-artifact@v8
        with:
          name: bl4ck-helper-windows.msi
          path: staging/

      - name: Validate signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
        run: |
          $required = @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SIGNING_ENDPOINT", "AZURE_SIGNING_ACCOUNT_NAME")
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Missing required signing secret: $name"
            }
          }

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign viewer MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}/staging/breeze-viewer-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign viewer MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}/staging/breeze-viewer-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign helper MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}/staging/bl4ck-helper-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign helper MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}/staging/bl4ck-helper-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        shell: pwsh
        run: |
          $targets = @(
            (Join-Path $env:GITHUB_WORKSPACE "staging\breeze-viewer-windows.msi"),
            (Join-Path $env:GITHUB_WORKSPACE "staging\bl4ck-helper-windows.msi")
          )
          foreach ($target in $targets) {
            $sig = Get-AuthenticodeSignature -FilePath $target
            if ($sig.Status -ne "Valid" -and $sig.Status -ne "UnknownError") {
              throw "Signature validation failed for $target. Status: $($sig.Status)"
            }
            if ($sig.Status -eq "UnknownError") {
              Write-Host "::warning::$target signed but root cert not yet trusted locally (Status: UnknownError)."
            }
            Write-Host "Verified: $target - Status: $($sig.Status) - Signer: $($sig.SignerCertificate.Subject)"
          }

      - name: Upload signed viewer MSI
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-windows.msi
          path: staging/breeze-viewer-windows.msi
          overwrite: true
          retention-days: 30

      - name: Upload signed helper MSI
        uses: actions/upload-artifact@v7
        with:
          name: bl4ck-helper-windows.msi
          path: staging/bl4ck-helper-windows.msi
          overwrite: true
          retention-days: 30

  package-windows-updater:
    name: Package Windows Updater Bundle
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: ubuntu-latest
    needs: [sign-windows-tauri]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download signed viewer MSI
        uses: actions/download-artifact@v8
        with:
          name: breeze-viewer-windows.msi
          path: staging/

      - name: Create updater zip
        run: |
          set -euo pipefail
          if [ ! -s staging/breeze-viewer-windows.msi ]; then
            echo "::error::Signed MSI missing or empty at staging/breeze-viewer-windows.msi"
            exit 1
          fi
          cd staging
          zip -j breeze-viewer-windows.msi.zip breeze-viewer-windows.msi

      - name: Minisign the zip with Tauri key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          key_file=$(mktemp)
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$key_file"
          unset TAURI_SIGNING_PRIVATE_KEY
          cd apps/viewer
          pnpm exec tauri signer sign -f "$key_file" "$GITHUB_WORKSPACE/staging/breeze-viewer-windows.msi.zip"
          if [ ! -s "$GITHUB_WORKSPACE/staging/breeze-viewer-windows.msi.zip.sig" ]; then
            echo "::error::Tauri signer did not produce .sig file"
            exit 1
          fi

      - name: Upload Windows updater bundle
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-windows-updater
          path: |
            staging/breeze-viewer-windows.msi.zip
            staging/breeze-viewer-windows.msi.zip.sig
          retention-days: 30

  merge-viewer-update-manifest:
    name: Generate Viewer Update Manifest
    runs-on: ubuntu-latest
    needs: [build-viewer, package-windows-updater]
    if: >-
      !cancelled()
      && (needs.build-viewer.result == 'success' || needs.build-viewer.result == 'skipped')
      && (needs.package-windows-updater.result == 'success' || needs.package-windows-updater.result == 'skipped')
    steps:
      - name: Download viewer updater bundles
        uses: actions/download-artifact@v8
        with:
          path: updater-bundles
          pattern: 'breeze-viewer-*-updater'
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          WIN_UPDATER_RESULT: ${{ needs.package-windows-updater.result }}
        run: |
          # Strip leading "v" and any prerelease suffix so the version matches
          # the one injected into tauri.conf.json at build time.
          version="${REF_NAME#v}"
          version="${version%%-*}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          release_base="${SERVER_URL}/${REPO}/releases/download/${REF_NAME}"
          notes_url="${SERVER_URL}/${REPO}/releases/tag/${REF_NAME}"

          echo "Downloaded updater bundle contents:"
          ls -la updater-bundles/ || true

          platforms='{}'

          # Windows MSI updater bundle
          win_sig="updater-bundles/breeze-viewer-windows.msi.zip.sig"
          if [ -f "$win_sig" ]; then
            sig_content=$(cat "$win_sig")
            url="${release_base}/breeze-viewer-windows.msi.zip"
            platforms=$(echo "$platforms" | jq \
              --arg sig "$sig_content" \
              --arg url "$url" \
              '. + {"windows-x86_64": {signature: $sig, url: $url}}')
          elif [ "$WIN_UPDATER_RESULT" = "success" ]; then
            echo "::error::package-windows-updater reported success but no sig found at $win_sig"
            exit 1
          else
            echo "::warning::Windows updater signature not found (upstream result: $WIN_UPDATER_RESULT) — Windows auto-update disabled for this release"
          fi

          if [ "$(echo "$platforms" | jq 'keys | length')" = "0" ]; then
            echo "::error::No updater platforms available — latest.json would be useless"
            exit 1
          fi

          jq -n \
            --arg version "$version" \
            --arg notes "See release notes at $notes_url" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload generated manifest
        uses: actions/upload-artifact@v7
        with:
          name: viewer-latest-json
          path: latest.json
          retention-days: 30

  release-integrity-gate:
    name: Release Integrity Gate
    runs-on: ubuntu-latest
    needs: [build-windows-msi, sign-windows-tauri, package-windows-updater, merge-viewer-update-manifest]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Fail closed when release signing was skipped
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          SKIP_RELEASE: ${{ inputs.skip_release || false }}
          BUILD_WINDOWS_MSI_RESULT: ${{ needs.build-windows-msi.result }}
          SIGN_WINDOWS_TAURI_RESULT: ${{ needs.sign-windows-tauri.result }}
          PACKAGE_WINDOWS_UPDATER_RESULT: ${{ needs.package-windows-updater.result }}
          MERGE_VIEWER_UPDATE_MANIFEST_RESULT: ${{ needs.merge-viewer-update-manifest.result }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$SKIP_RELEASE" == "true" ]]; then
            echo "Build-only workflow_dispatch run: release signing gate is advisory."
            exit 0
          fi

          failed=0
          require_success() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "::error::$name must succeed for tag release $REF_NAME; got '$result'."
              failed=1
            fi
          }

          require_success "build-windows-msi" "$BUILD_WINDOWS_MSI_RESULT"
          require_success "sign-windows-tauri" "$SIGN_WINDOWS_TAURI_RESULT"
          require_success "package-windows-updater" "$PACKAGE_WINDOWS_UPDATER_RESULT"
          require_success "merge-viewer-update-manifest" "$MERGE_VIEWER_UPDATE_MANIFEST_RESULT"

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi
          echo "All required signing/notarization jobs succeeded for tag release $REF_NAME."

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-agent, build-windows-msi, sign-windows-tauri, build-viewer, build-helper, merge-viewer-update-manifest, package-windows-updater, release-integrity-gate]
    if: >-
      !cancelled()
      && needs.build-api.result == 'success'
      && needs.build-web.result == 'success'
      && needs.build-agent.result == 'success'
      && needs.release-integrity-gate.result == 'success'
      && (needs.build-windows-msi.result == 'success' || needs.build-windows-msi.result == 'skipped')
      && (needs.sign-windows-tauri.result == 'success' || needs.sign-windows-tauri.result == 'skipped')
      && (needs.package-windows-updater.result == 'success' || needs.package-windows-updater.result == 'skipped')
      && (needs.build-viewer.result == 'success' || needs.build-viewer.result == 'skipped')
      && (needs.build-helper.result == 'success' || needs.build-helper.result == 'skipped')
      && (needs.merge-viewer-update-manifest.result == 'success' || needs.merge-viewer-update-manifest.result == 'skipped')
      && !(github.event_name == 'workflow_dispatch' && inputs.skip_release)
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '{api-dist,web-dist,bl4ck-agent-*,bl4ck-backup-*,bl4ck-user-helper-*,bl4ck-watchdog-*,breeze-viewer-*,bl4ck-helper-*,viewer-latest-json}'
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy agent binaries
          for dir in artifacts/bl4ck-agent-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy backup binaries
          for dir in artifacts/bl4ck-backup-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy user-helper binaries (Windows-only sibling of the agent that
          # runs in interactive user sessions). See #816.
          for dir in artifacts/bl4ck-user-helper-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy watchdog binaries
          for dir in artifacts/bl4ck-watchdog-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy viewer installers
          for dir in artifacts/breeze-viewer-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy viewer update manifest
          if [ -d "artifacts/viewer-latest-json" ] && [ -f "artifacts/viewer-latest-json/latest.json" ]; then
            cp artifacts/viewer-latest-json/latest.json release-assets/latest.json
          fi

          # Copy helper installers
          for dir in artifacts/bl4ck-helper-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Create archives for API and Web
          if [ -d "artifacts/api-dist" ]; then
            tar -czvf release-assets/breeze-api.tar.gz -C artifacts/api-dist .
          fi

          if [ -d "artifacts/web-dist" ]; then
            tar -czvf release-assets/breeze-web.tar.gz -C artifacts/web-dist .
          fi

          python3 <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release_dir = Path("release-assets")
          excluded = {
              "checksums.txt",
              "release-artifact-manifest.json",
              "release-artifact-manifest.json.ed25519",
              "release-artifact-manifest.json.minisig",
          }

          def platform_trust(name):
              if name.endswith(".msi") or name.endswith(".exe"):
                  return "windows-authenticode-required"
              return "release-workflow-produced"

          assets = []
          for path in sorted(release_dir.iterdir(), key=lambda item: item.name):
              if not path.is_file() or path.name in excluded:
                  continue
              assets.append({
                  "name": path.name,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  "size": path.stat().st_size,
                  "platformTrust": platform_trust(path.name),
              })

          manifest = {
              "schemaVersion": 1,
              "repository": os.environ["GITHUB_REPOSITORY"],
              "release": os.environ["GITHUB_REF_NAME"],
              "assets": assets,
          }
          (release_dir / "release-artifact-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n"
          )
          PY

      - name: Sign release artifact manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY: ${{ secrets.RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY }}
          RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY: ${{ secrets.RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY }}
          RELEASE_MANIFEST_ED25519_PRIVATE_KEY: ${{ secrets.RELEASE_MANIFEST_ED25519_PRIVATE_KEY }}
          RELEASE_MANIFEST_ED25519_PUBLIC_KEY: ${{ secrets.RELEASE_MANIFEST_ED25519_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY" ] || [ -z "$RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY" ]; then
            echo "::error::RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY and RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY are required for tag releases."
            exit 1
          fi
          if [ -z "$RELEASE_MANIFEST_ED25519_PRIVATE_KEY" ] || [ -z "$RELEASE_MANIFEST_ED25519_PUBLIC_KEY" ]; then
            echo "::error::RELEASE_MANIFEST_ED25519_PRIVATE_KEY and RELEASE_MANIFEST_ED25519_PUBLIC_KEY are required for tag releases."
            exit 1
          fi

          # Harden against a degraded Azure apt mirror (same flake as #1605).
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' \
            /etc/apt/sources.list \
            /etc/apt/sources.list.d/*.list \
            /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y --no-install-recommends minisign; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to install minisign after 3 attempts."
              exit 1
            fi
            echo "::warning::apt install failed (attempt ${attempt}/3); retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done

          key_file="$RUNNER_TEMP/release-manifest.minisign.key"
          printf '%s' "$RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY" > "$key_file"
          unset RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY
          chmod 600 "$key_file"

          minisign -S \
            -s "$key_file" \
            -m release-assets/release-artifact-manifest.json \
            -x release-assets/release-artifact-manifest.json.minisig \
            -t "BL4CK release artifact manifest ${GITHUB_REF_NAME}"

          minisign -V \
            -P "$RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY" \
            -m release-assets/release-artifact-manifest.json \
            -x release-assets/release-artifact-manifest.json.minisig

          node <<'NODE'
          const { createPrivateKey, createPublicKey, sign, verify } = require('node:crypto');
          const { readFileSync, writeFileSync } = require('node:fs');

          const spkiPrefix = Buffer.from('302a300506032b6570032100', 'hex');

          function parsePrivateKey(value) {
            const trimmed = value.trim();
            if (trimmed.includes('BEGIN PRIVATE KEY')) {
              return createPrivateKey(trimmed);
            }
            return createPrivateKey({
              key: Buffer.from(trimmed, 'base64'),
              format: 'der',
              type: 'pkcs8',
            });
          }

          function parsePublicKey(value) {
            const trimmed = value.trim();
            if (trimmed.includes('BEGIN PUBLIC KEY')) {
              return createPublicKey(trimmed);
            }
            const decoded = Buffer.from(trimmed, 'base64');
            if (decoded.length === 32) {
              return createPublicKey({
                key: Buffer.concat([spkiPrefix, decoded]),
                format: 'der',
                type: 'spki',
              });
            }
            return createPublicKey({ key: decoded, format: 'der', type: 'spki' });
          }

          const manifest = readFileSync('release-assets/release-artifact-manifest.json');
          const privateKey = parsePrivateKey(process.env.RELEASE_MANIFEST_ED25519_PRIVATE_KEY);
          const publicKey = parsePublicKey(process.env.RELEASE_MANIFEST_ED25519_PUBLIC_KEY);
          const signature = sign(null, manifest, privateKey);
          if (!verify(null, manifest, publicKey, signature)) {
            throw new Error('Ed25519 release manifest signature self-verification failed');
          }
          writeFileSync(
            'release-assets/release-artifact-manifest.json.ed25519',
            `${signature.toString('base64')}\n`,
            { mode: 0o644 }
          );
          NODE

      - name: Generate release checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt

      - name: Verify release asset integrity requirements
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # checksums.txt is verified for existence/non-emptiness but cannot
          # contain a SHA entry for itself: `sha256sum * > checksums.txt`
          # expands the glob before creating the redirection target.
          if [ ! -s "release-assets/checksums.txt" ]; then
            echo "::error::Required asset missing or empty: checksums.txt"
            exit 1
          fi

          # Build the asset list dynamically from release-assets/ to catch
          # partial-upload failures (missing AppImage, DMG, signature, etc.)
          # that a hand-curated list silently allows.
          # ! -name '.*' mirrors `sha256sum *`'s glob (which excludes dotfiles)
          # so the two steps see the same file set. Materialize via a tempfile
          # so a `find` failure propagates under set -e (process substitution
          # exit codes don't reach the parent shell).
          assets_list=$(mktemp)
          trap 'rm -f "$assets_list"' EXIT
          find release-assets -mindepth 1 -maxdepth 1 -type f ! -name '.*' -print0 \
            > "$assets_list"

          asset_count=0
          while IFS= read -r -d '' path; do
            asset=$(basename "$path")
            [ "$asset" = "checksums.txt" ] && continue
            asset_count=$((asset_count + 1))
            if [ ! -s "$path" ]; then
              echo "::error::Required signed/notarized release asset missing or empty: $asset"
              exit 1
            fi
            if ! awk -v asset="$asset" '
              $1 ~ /^[a-f0-9]{64}$/ {
                name=$0
                sub(/^[a-f0-9]{64}[[:space:]]+[*]?/, "", name)
                if (name == asset) found=1
              }
              END { exit found ? 0 : 1 }
            ' release-assets/checksums.txt; then
              echo "::error::checksums.txt missing SHA-256 entry for $asset"
              exit 1
            fi
          done < "$assets_list"

          if [ "$asset_count" -eq 0 ]; then
            echo "::error::No signable artifacts found in release-assets/ (only checksums.txt or empty)"
            exit 1
          fi
          echo "Verified $asset_count release assets against checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync agent versions to BL4CK API
        if: ${{ !contains(github.ref_name, '-') && vars.BREEZE_API_URL != '' }}
        env:
          BREEZE_API_URL: ${{ vars.BREEZE_API_URL }}
          BREEZE_API_KEY: ${{ secrets.BREEZE_API_KEY }}
        run: |
          curl -sf -X POST "${BREEZE_API_URL}/api/v1/agent-versions/sync-github" \
            -H "Authorization: Bearer ${BREEZE_API_KEY}" \
            -H "Content-Type: application/json" \
            || echo "::warning::Agent version sync failed (non-fatal)"

  build-binaries-image:
    name: Build & Push Binaries Init Image
    runs-on: ubuntu-latest
    needs: [build-agent, build-windows-msi, sign-windows-tauri, build-viewer, build-helper, create-release]
    if: >-
      !cancelled()
      && needs.build-agent.result == 'success'
      && (needs.build-windows-msi.result == 'success' || needs.build-windows-msi.result == 'skipped')
      && (needs.sign-windows-tauri.result == 'success' || needs.sign-windows-tauri.result == 'skipped')
      && needs.build-viewer.result == 'success'
      && needs.build-helper.result == 'success'
      && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create staging directory
        run: mkdir -p staging/agent staging/viewer staging/helper

      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/agent
          pattern: 'bl4ck-agent-*'
          merge-multiple: true

      - name: Download viewer artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/viewer
          pattern: 'breeze-viewer-*'
          merge-multiple: true

      - name: Download helper artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/helper
          pattern: 'bl4ck-helper-*'
          merge-multiple: true

      - name: Write VERSION file
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "${REF_NAME#v}" > staging/VERSION

      - name: List staging contents
        run: find staging -type f | sort

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/binaries
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha

      - name: Build and push binaries image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: staging/
          file: docker/Dockerfile.binaries
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-docker-api:
    name: Build & Push API Docker Image
    runs-on: ubuntu-latest
    needs: [build-api, create-release]
    if: >-
      !cancelled()
      && needs.build-api.result == 'success'
      && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
